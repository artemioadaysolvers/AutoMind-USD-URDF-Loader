<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>AutoMind USD Viewer</title>
  <style>
    :root { --vh: 1vh; }
    html, body { margin:0; padding:0; width:100%; height:100dvh; overflow:hidden; background:#ffffff; }
    @supports not (height: 100dvh) { html, body { height: calc(var(--vh) * 100); } }
    body { padding-top: env(safe-area-inset-top); padding-right: env(safe-area-inset-right); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); }
    #app { position:fixed; inset:0; width:100vw; height:100dvh; touch-action:none; }
    @supports not (height: 100dvh) { #app { height: calc(var(--vh) * 100); } }
    #dropOverlay { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:20; width:min(520px, calc(100vw - 32px)); border:1px dashed #9cc; border-radius:18px; background:rgba(255,255,255,.92); box-shadow:0 12px 36px rgba(0,0,0,.12); padding:22px; font-family:Inter,system-ui,Segoe UI,Roboto,Arial; text-align:center; color:#0b3b3c; }
    #dropOverlay.drag { background:rgba(20,184,185,.12); border-color:#0ea5a6; }
    #dropOverlay.hidden { display:none; }
    #dropOverlay h1 { font-size:18px; margin:0 0 8px; }
    #dropOverlay p { font-size:13px; color:#577e7f; margin:0 0 14px; }
    .btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    label { border:1px solid #d7e7e7; border-radius:12px; padding:10px 12px; cursor:pointer; font-weight:800; font-size:12px; background:#fff; }
    input[type=file] { display:none; }
    .badge { position:fixed; right:14px; bottom:10px; z-index:10; user-select:none; pointer-events:none; }
    .badge img { max-height:40px; display:block; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="dropOverlay">
    <h1>AutoMind USD Viewer</h1>
    <p>Drop a complete USD folder or choose .usda/.usd plus textures.</p>
    <div class="btns">
      <label>Select folder<input id="folderInput" type="file" webkitdirectory directory multiple></label>
      <label>Select files<input id="fileInput" type="file" multiple accept=".usda,.usd,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg"></label>
    </div>
  </div>
  <div style="padding-left:20px; overflow:visible; position:fixed; right:0; bottom:0; z-index:999999;">
    <div class="badge" style="display:inline-block; transform: scale(2.5) translateX(-15px); transform-origin: bottom right; margin:0; overflow:visible; pointer-events:none;">
      <img src="https://raw.githubusercontent.com/artemioadaysolvers/AutoMindCloudExperimental/main/AutoMindCloud/AutoMindCloud2.png" alt="AutoMind" style="display:block; height:40px; width:auto;"/>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  <script type="module">
    import { render } from './usd_viewer_main.js';

    function applyVHVar() {
      const viewport = window.visualViewport?.height || window.innerHeight || 600;
      document.documentElement.style.setProperty('--vh', `${viewport * 0.01}px`);
    }
    applyVHVar(); window.addEventListener('resize', applyVHVar); window.visualViewport?.addEventListener('resize', applyVHVar);

    const appHost = document.getElementById('app');
    const overlay = document.getElementById('dropOverlay');
    let viewer = null;

    function escPath(p) { return String(p || '').replace(/\\/g,'/').replace(/^\.\//,''); }
    async function filesToPayload(files) {
      const arr = Array.from(files || []);
      const usd = arr.find(f => /\.usda$/i.test(f.name)) || arr.find(f => /\.usd$/i.test(f.name));
      if (!usd) throw new Error('No .usda/.usd ASCII file found.');
      const usdContent = await usd.text();
      if (!/^#usda/i.test(usdContent.trim()) && !/def\s+Xform/.test(usdContent)) throw new Error('The USD file does not look like ASCII .usda/.usd.');
      const assetDB = {};
      for (const f of arr) {
        if (!/\.(png|jpg|jpeg|webp|gif|bmp|svg)$/i.test(f.name)) continue;
        const key = escPath(f.webkitRelativePath || f.name);
        const b64 = await new Promise((resolve, reject) => {
          const r = new FileReader(); r.onload = () => resolve(String(r.result || '').split(',')[1] || ''); r.onerror = reject; r.readAsDataURL(f);
        });
        assetDB[key] = b64; assetDB[f.name] = b64; assetDB[key.toLowerCase()] = b64; assetDB[f.name.toLowerCase()] = b64; assetDB[key.replace(/ /g, '%20')] = b64; assetDB[key.replace(/ /g, '_')] = b64;
      }
      return { usdContent, assetDB, usdName: usd.name };
    }
    async function loadFiles(files) {
      try {
        const payload = await filesToPayload(files);
        viewer?.destroy?.();
        viewer = render({ container: appHost, usdContent: payload.usdContent, assetDB: payload.assetDB, selectMode:'link', background:0xffffff });
        overlay.classList.add('hidden');
      } catch (e) { alert(String(e.message || e)); console.error(e); }
    }
    document.getElementById('folderInput').addEventListener('change', e => loadFiles(e.target.files));
    document.getElementById('fileInput').addEventListener('change', e => loadFiles(e.target.files));
    ['dragenter','dragover'].forEach(ev => overlay.addEventListener(ev, e => { e.preventDefault(); overlay.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev => overlay.addEventListener(ev, e => { e.preventDefault(); overlay.classList.remove('drag'); }));
    overlay.addEventListener('drop', e => loadFiles(e.dataTransfer.files));
  </script>
</body>
</html>
